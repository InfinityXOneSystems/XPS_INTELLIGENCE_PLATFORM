# markdownlint configuration for XPS Intelligence Platform
# https://github.com/DavidAnson/markdownlint

default: true

# MD013: Line length — disabled to allow readable governance docs
MD013: false

# MD022: Headings should be surrounded by blank lines — disabled because
#        several pre-existing files (BLUEPRINT.md, CHANGELOG.md, docs/) do not
#        follow this convention and were added before this governance layer
MD022: false

# MD031: Fenced code blocks should be surrounded by blank lines — disabled
#        for the same reason as MD022
MD031: false

# MD032: Lists should be surrounded by blank lines — disabled for the same
#        reason as MD022
MD032: false

# MD033: Inline HTML — disabled; HTML is used in tables and documentation
MD033: false

# MD040: Fenced code blocks should have a language specified — disabled;
#        pre-existing docs use code blocks without language specifiers
MD040: false

# MD041: First line should be top-level heading — disabled for files that
#        start with a comment or metadata block
MD041: false

# MD024: Multiple headings with the same content — disabled to allow
#        repeated section names (e.g., "Requirements") across files
MD024: false

# MD036: Emphasis used instead of heading — disabled for prompt files
#        and documentation that uses bold for labels
MD036: false

# MD047: Files should end with a single newline — disabled to avoid
#        CI failures on files not managed by this PR (e.g., README.md)
MD047: false

# MD049: Emphasis style — disabled; pre-existing files use asterisk style
MD049: false

# MD058: Tables should be surrounded by blank lines — disabled; pre-existing
#        docs do not consistently add blank lines around tables
MD058: false

# MD060: Table column style — disabled; both compact and spaced styles
#        are acceptable in governance documentation
MD060: false
