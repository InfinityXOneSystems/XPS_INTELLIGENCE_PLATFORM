name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened, edited]

jobs:
  label-pr:
    name: Label Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Label by changed files
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
        continue-on-error: true

      - name: Label by PR title (Conventional Commits)
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];

            // Conventional commit type labels
            const typeMap = {
              'feat': ['enhancement', 'feature'],
              'fix': ['bug', 'fix'],
              'docs': ['documentation'],
              'refactor': ['refactor'],
              'test': ['testing'],
              'ci': ['ci/cd'],
              'security': ['security'],
              'chore': ['chore'],
              'perf': ['performance'],
            };

            for (const [prefix, lbls] of Object.entries(typeMap)) {
              if (title.startsWith(prefix + ':') || title.startsWith(prefix + '(')) {
                labels.push(...lbls);
                break;
              }
            }

            // Phase labels
            const phaseMap = {
              'phase1': 'phase-1',
              'phase2': 'phase-2',
              'phase3': 'phase-3',
              'phase4': 'phase-4',
              'phase5': 'phase-5',
            };
            for (const [key, lbl] of Object.entries(phaseMap)) {
              if (title.includes(key)) labels.push(lbl);
            }

            // Size labels based on changed lines
            const pr = context.payload.pull_request;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const totalChanges = additions + deletions;

            if (totalChanges < 10) labels.push('size/xs');
            else if (totalChanges < 50) labels.push('size/s');
            else if (totalChanges < 200) labels.push('size/m');
            else if (totalChanges < 500) labels.push('size/l');
            else labels.push('size/xl');

            // WIP label
            if (title.includes('wip') || title.includes('draft') ||
                context.payload.pull_request.draft) {
              labels.push('wip');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels,
              }).catch(() => {}); // Ignore if labels don't exist yet
            }

  label-issue:
    name: Label Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write

    steps:
      - name: Label by issue title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            if (title.startsWith('fix:') || title.startsWith('bug:')) labels.push('bug');
            if (title.startsWith('feat:')) labels.push('enhancement');
            if (title.startsWith('docs:')) labels.push('documentation');
            if (title.startsWith('security:')) labels.push('security');
            if (title.startsWith('phase5:')) labels.push('phase-5', 'autonomous');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels,
              }).catch(() => {});
            }
