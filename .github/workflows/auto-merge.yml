name: Auto Merge

on:
  # Triggered when CI passes, label is added, or review is submitted
  pull_request:
    types: [labeled, unlabeled, synchronize, review_requested]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to attempt auto-merge
        required: true
        type: number

jobs:
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      checks: read

    steps:
      - uses: actions/checkout@v6

      - name: Attempt auto-merge
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ github.event.inputs.pr_number || github.event.pull_request.number || 0 }};

            if (prNumber === 0) {
              console.log('No PR number available — skipping');
              return;
            }

            // Fetch PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            console.log(`PR #${prNumber}: ${pr.title}`);
            console.log(`Target branch: ${pr.base.ref}`);
            console.log(`State: ${pr.state}, Draft: ${pr.draft}`);
            console.log(`Mergeable: ${pr.mergeable}`);

            // ── Gate checks ──────────────────────────────────────────────

            // 1. PR must be open and not a draft
            if (pr.state !== 'open') {
              console.log('PR is not open — skipping');
              return;
            }
            if (pr.draft) {
              console.log('PR is a draft — skipping');
              return;
            }

            // 2. Must have the 'auto-merge' label
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('auto-merge')) {
              console.log('Missing auto-merge label — skipping');
              return;
            }

            // 3. Must NOT have 'do-not-merge' label
            if (labels.includes('do-not-merge') || labels.includes('wip')) {
              console.log('do-not-merge or wip label present — skipping');
              return;
            }

            // 4. Target branch must be develop (not main — main requires human approval)
            if (!['develop'].includes(pr.base.ref)) {
              console.log(`Target branch is ${pr.base.ref} — auto-merge only for develop`);
              return;
            }

            // 5. Check all required status checks pass
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            const requiredChecks = ['CI Gate'];
            const checkResults = checks.check_runs.reduce((acc, run) => {
              acc[run.name] = run.conclusion;
              return acc;
            }, {});

            console.log('Check results:', JSON.stringify(checkResults, null, 2));

            for (const check of requiredChecks) {
              if (checkResults[check] !== 'success') {
                console.log(`Required check "${check}" has not passed (${checkResults[check]}) — skipping`);
                return;
              }
            }

            // 6. Must have at least one approving review
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const latestReviews = {};
            for (const review of reviews) {
              if (review.state !== 'COMMENTED') {
                latestReviews[review.user.login] = review.state;
              }
            }

            const hasApproval = Object.values(latestReviews).includes('APPROVED');
            const hasChangesRequested = Object.values(latestReviews).includes('CHANGES_REQUESTED');

            if (!hasApproval) {
              console.log('No approving review — skipping');
              return;
            }
            if (hasChangesRequested) {
              console.log('Changes requested — skipping');
              return;
            }

            // ── All gates passed — merge ──────────────────────────────────
            console.log('✅ All gates passed — merging PR');

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${pr.title} (#${prNumber})`,
                commit_message: `Auto-merged by autonomous pipeline\n\n${pr.body || ''}`.trim(),
              });
              console.log(`✅ PR #${prNumber} merged successfully`);
            } catch (error) {
              console.log(`❌ Merge failed: ${error.message}`);
              // Add a comment on failure
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⚠️ **Auto-merge failed:** ${error.message}\n\nManual merge may be required.`,
              });
            }

  # ────────────────────────────────────────────────────────
  # Dependabot auto-approve + auto-merge (safe updates only)
  # ────────────────────────────────────────────────────────
  dependabot-auto-merge:
    name: Dependabot Auto Merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Auto-approved by autonomous pipeline (patch/minor update)',
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['auto-merge', 'dependencies'],
            }).catch(() => {});
