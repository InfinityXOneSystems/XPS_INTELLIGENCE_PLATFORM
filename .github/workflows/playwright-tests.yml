name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Minimal permissions — jobs override as needed
permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: ${{ hashFiles('**/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: "**/package-lock.json"

      - name: Install root dependencies
        run: |
          if [[ -f "package-lock.json" ]]; then
            npm ci --ignore-scripts
          elif [[ -f "package.json" ]]; then
            npm install --ignore-scripts
          else
            npm init -y
            npm install --save-dev @playwright/test
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ secrets.FRONTEND_URL || 'http://localhost:3000' }}
          CI: true
        run: |
          if [[ -d "tests/e2e" && "$(ls -A tests/e2e/*.spec.ts 2>/dev/null | wc -l)" -gt 0 ]]; then
            npx playwright test --reporter=html,github
          else
            echo "⚠️  No E2E test specs yet — foundation phase. Creating placeholder test."
            mkdir -p tests/e2e
            cat > /tmp/placeholder.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test('foundation: playwright is configured', async ({ page }) => {
            // Placeholder test — passes until real tests are added.
            // Replace with actual navigation tests once frontend is deployed.
            expect(true).toBe(true);
          });
          EOF
            npx playwright test /tmp/placeholder.spec.ts --reporter=github || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-snapshots-${{ github.run_id }}
          path: tests/e2e/snapshots/
          retention-days: 30

  # ────────────────────────────────────────────────────────
  # Visual Regression (snapshot diff)
  # ────────────────────────────────────────────────────────
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: playwright
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Download snapshots (PR)
        uses: actions/download-artifact@v8
        with:
          name: playwright-snapshots-${{ github.run_id }}
          path: /tmp/pr-snapshots
        continue-on-error: true

      - name: Visual diff summary
        run: |
          echo "## Playwright Visual Snapshot Summary" >> "$GITHUB_STEP_SUMMARY"
          SNAP_COUNT=$(find /tmp/pr-snapshots -name "*.png" 2>/dev/null | wc -l)
          echo "📸 Snapshots captured: $SNAP_COUNT" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$SNAP_COUNT" -eq 0 ]]; then
            echo "ℹ️  No snapshots yet (foundation phase)" >> "$GITHUB_STEP_SUMMARY"
          fi
