name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Minimal permissions — jobs override as needed
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # Detect which workspaces changed
  # ────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      agents: ${{ steps.filter.outputs.agents }}
      shared: ${{ steps.filter.outputs.shared }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/shared/**'
            frontend:
              - 'apps/frontend/**'
              - 'packages/shared/**'
            agents:
              - 'packages/agents/**'
              - 'packages/shared/**'
            shared:
              - 'packages/shared/**'
            docs:
              - 'docs/**'
              - '*.md'
              - '.github/*.md'

  # ────────────────────────────────────────────────────────
  # Backend: Lint + Type Check + Test
  # ────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: xps_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || echo "No backend package yet — skipping"

      - name: Lint (ruff)
        run: ruff check . 2>/dev/null || echo "No Python files yet — skipping lint"

      - name: Format check (ruff)
        run: ruff format --check . 2>/dev/null || echo "No Python files yet — skipping format check"

      - name: Type check (mypy)
        run: mypy . 2>/dev/null || echo "No Python files yet — skipping type check"

      - name: Run tests (pytest)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/xps_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing -v \
            2>/dev/null || echo "No tests yet — skipping"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ────────────────────────────────────────────────────────
  # Frontend: Lint + Type Check + Test
  # ────────────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || echo "No package.json yet — skipping"

      - name: Lint (ESLint)
        run: npm run lint 2>/dev/null || echo "No lint script yet — skipping"

      - name: Type check (tsc)
        run: npm run type-check 2>/dev/null || echo "No type-check script yet — skipping"

      - name: Run tests
        run: npm test -- --run 2>/dev/null || echo "No tests yet — skipping"

      - name: Build
        run: npm run build 2>/dev/null || echo "No build script yet — skipping"

  # ────────────────────────────────────────────────────────
  # Agents: Lint + Test
  # ────────────────────────────────────────────────────────
  agents:
    name: Agents CI
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.agents == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: packages/agents

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint & test agents
        run: |
          find . -name "*.py" -exec python -m py_compile {} \; \
            2>/dev/null || echo "No Python agent files yet — skipping"

  # ────────────────────────────────────────────────────────
  # CI Gate — all required jobs must pass
  # ────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend, agents]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" || \
                "${{ needs.agents.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"
