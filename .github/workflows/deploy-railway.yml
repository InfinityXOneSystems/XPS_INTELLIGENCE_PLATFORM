name: Deploy to Railway

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      service:
        description: Service to deploy
        required: true
        default: all
        type: choice
        options: [all, backend, frontend]

# Minimal permissions — jobs override as needed
permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────
  # Determine environment
  # ────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      deploy_backend: ${{ steps.services.outputs.backend }}
      deploy_frontend: ${{ steps.services.outputs.frontend }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine services
        id: services
        run: |
          SERVICE="${{ github.event.inputs.service || 'all' }}"
          if [[ "$SERVICE" == "all" || "$SERVICE" == "backend" ]]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$SERVICE" == "all" || "$SERVICE" == "frontend" ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────
  # Deploy Backend
  # ────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.deploy_backend == 'true'
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [[ -f "apps/backend/railway.json" ]]; then
            railway up --service xps-backend --detach
          else
            echo "⚠️  No backend railway.json yet — skipping deploy (foundation phase)"
          fi

      - name: Backend health check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [[ -n "$BACKEND_URL" ]]; then
            echo "Waiting for backend to be healthy..."
            for i in {1..12}; do
              if curl -sf "${BACKEND_URL}/health" >/dev/null 2>&1; then
                echo "✅ Backend healthy"
                exit 0
              fi
              echo "Attempt $i/12 failed, waiting 10s..."
              sleep 10
            done
            echo "❌ Backend health check failed"
            exit 1
          else
            echo "⚠️  BACKEND_URL not set — skipping health check (foundation phase)"
          fi

  # ────────────────────────────────────────────────────────
  # Deploy Frontend
  # ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.deploy_frontend == 'true'
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [[ -f "apps/frontend/railway.json" ]]; then
            railway up --service xps-frontend --detach
          else
            echo "⚠️  No frontend railway.json yet — skipping deploy (foundation phase)"
          fi

      - name: Frontend health check
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          if [[ -n "$FRONTEND_URL" ]]; then
            echo "Waiting for frontend to be healthy..."
            for i in {1..12}; do
              if curl -sf "${FRONTEND_URL}" >/dev/null 2>&1; then
                echo "✅ Frontend healthy"
                exit 0
              fi
              echo "Attempt $i/12 failed, waiting 10s..."
              sleep 10
            done
            echo "❌ Frontend health check failed"
            exit 1
          else
            echo "⚠️  FRONTEND_URL not set — skipping health check (foundation phase)"
          fi

  # ────────────────────────────────────────────────────────
  # Deploy Summary
  # ────────────────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [setup, deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | ${{ needs.deploy-backend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ needs.setup.outputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
