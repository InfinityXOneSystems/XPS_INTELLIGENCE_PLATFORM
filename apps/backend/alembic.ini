# Alembic configuration for XPS Intelligence Platform backend.
# Run from apps/backend/:  alembic upgrade head
# Or use the root script:  ./scripts/db-migrate.sh

[alembic]
# Path to migration scripts, relative to this file
script_location = migrations

# Template for new revision file names
file_template = %%(rev)s_%%(slug)s

# Timezone for the generated dates
timezone = UTC

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
